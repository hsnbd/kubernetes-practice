apiVersion: apps/v1
kind: Deployment
metadata:
  name: ads-manager
  labels:
    app: ads-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ads-manager
  template:
    metadata:
      labels:
        app: ads-manager
    spec:
      containers:
        - name: ads-manager
          image: ads-manager
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@todo-pg-db:5432/tododb"
            - name: JWT_SECRET
              value: "my-super-secret-jwt-key-change-in-production"
            - name: CORS_ORIGINS
              value: '["http://localhost:3000"]'
            - name: LOG_LEVEL
              value: "INFO"
            - name: ANALYSIS_INTERVAL_MINUTES
              value: "15"
---
apiVersion: v1
kind: Service
metadata:
  name: ads-manager
  labels:
    app: ads-manager
spec:
  selector:
    app: ads-manager
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP